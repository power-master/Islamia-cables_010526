<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f3f6fb;
}

header{
background:linear-gradient(135deg,#001a3d,#003c82);
color:#fff;
padding:40px 20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

header h1{
font-size:46px;
margin-bottom:10px;
}

header h2{
font-size:28px;
color:#ffd34d;
margin-bottom:18px;
}

header .manager{
font-size:24px;
margin-bottom:8px;
}

header .phone{
font-size:34px;
font-weight:bold;
color:#00ffcc;
margin-bottom:15px;
}

header .title{
font-size:22px;
}

.container{
max-width:1100px;
margin:auto;
padding:30px 15px;
}

.box{
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-top:-30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

label{
display:block;
font-weight:bold;
margin-bottom:10px;
font-size:18px;
}

select,input{
width:100%;
padding:15px;
font-size:18px;
border:1px solid #ccc;
border-radius:12px;
outline:none;
}

.result{
margin-top:25px;
padding:30px;
border-radius:18px;
background:#eefaf0;
border:2px solid #4caf50;
display:none;
}

.desc{
font-size:28px;
font-weight:bold;
line-height:1.7;
margin-bottom:18px;
}

.price{
font-size:42px;
font-weight:bold;
color:#008c2a;
margin-bottom:10px;
}

.oldprice{
font-size:30px;
color:#444;
margin-bottom:10px;
}

.newprice{
font-size:50px;
font-weight:bold;
color:#d50000;
}

.unit{
font-size:24px;
margin-top:12px;
color:#444;
}

.notfound{
background:#fff4f4;
border-color:#e53935;
}

.notfound .newprice{
color:#d50000;
font-size:36px;
}

@media(max-width:700px){

header h1{font-size:34px;}
header h2{font-size:22px;}
header .phone{font-size:28px;}

.desc{font-size:22px;}
.price,.newprice{font-size:34px;}
.oldprice{font-size:24px;}

}
</style>
</head>

function loadTypes(){

let types=[...new Set(data.map(x=>x.type))];

let select=document.getElementById("type");

types.forEach(t=>{
select.innerHTML+=`<option>${t}</option>`;
});

}

function loadSizes(){

let type=document.getElementById("type").value;
let size=document.getElementById("size");

size.innerHTML='<option value="">اختر المقاس</option>';

let sizes=data.filter(x=>x.type===type).map(x=>x.size);

sizes.forEach(s=>{
size.innerHTML+=`<option>${s}</option>`;
});

}

function showPrice(){

let type=document.getElementById("type").value;
let size=document.getElementById("size").value;
let percent=parseFloat(document.getElementById("change").value) || 0;

let box=document.getElementById("resultBox");

if(type==="" || size===""){
box.style.display="none";
return;
}

let item=data.find(x=>x.type===type && x.size===size);

box.style.display="block";

if(item){

box.classList.remove("notfound");

let oldPrice=parseFloat(item.price);
let newPrice=oldPrice + (oldPrice * percent / 100);

document.getElementById("desc").innerHTML=item.desc;
document.getElementById("oldprice").innerHTML="السعر الأصلى : EGP " + oldPrice.toFixed(2);
document.getElementById("newprice").innerHTML="السعر الجديد : EGP " + newPrice.toFixed(2);
document.getElementById("unit").innerHTML="سعر الوحدة : " + item.unit;

}else{

box.classList.add("notfound");

document.getElementById("desc").innerHTML="";
document.getElementById("oldprice").innerHTML="";
document.getElementById("newprice").innerHTML="السعر غير متوفر";
document.getElementById("unit").innerHTML="";

}

}
